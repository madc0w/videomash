<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#a855f7" />
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="64" height="64" rx="14" fill="url(#bg)" />
    <!-- Film strip left -->
    <rect x="8" y="14" width="6" height="36" rx="1" fill="#fff" opacity="0.25" />
    <rect x="9" y="16" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="9" y="22" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="9" y="28" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="9" y="34" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="9" y="40" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <!-- Film strip right -->
    <rect x="50" y="14" width="6" height="36" rx="1" fill="#fff" opacity="0.25" />
    <rect x="51" y="16" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="51" y="22" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="51" y="28" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="51" y="34" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <rect x="51" y="40" width="4" height="4" rx="0.5" fill="url(#bg)" />
    <!-- Play triangle -->
    <polygon points="26,20 26,44 46,32" fill="#fff" />
</svg>